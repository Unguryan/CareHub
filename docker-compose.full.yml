      RabbitMq__Host: rabbitmq
      RabbitMq__Username: carehub
      RabbitMq__Password: carehub_dev
      Identity__Authority: http://identity:5001
    command: ["CareHub.Patient.dll"]
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

