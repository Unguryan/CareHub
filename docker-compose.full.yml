services:
  identity:
    profiles: ["full"]
    build:
      context: .
      dockerfile: build/docker/Dockerfile.dotnet-service
      args:
        PROJECT_PATH: Services/Identity/CareHub.Identity/CareHub.Identity.csproj
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:5001
      Urls: http://0.0.0.0:5001
      Identity__Issuer: http://identity:5001
      CareHub__SeedDemoData: ${CAREHUB_SEED_DEMO_DATA:-true}
      ConnectionStrings__Identity: Host=postgres;Port=5432;Database=carehub_identity;Username=carehub;Password=carehub_dev
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: carehub
      RabbitMq__Password: carehub_dev
      Redis__ConnectionString: redis:6379
      TelegramBot__InternalBaseUrl: http://telegrambot:5011
    command: ["CareHub.Identity.dll"]
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  patient:
    profiles: ["full"]
    build:
      context: .
      dockerfile: build/docker/Dockerfile.dotnet-service
