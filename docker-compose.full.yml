      RabbitMq__Password: carehub_dev
      Identity__Authority: http://identity:5001
      Patient__BaseUrl: http://patient:5002
      Schedule__BaseUrl: http://schedule:5004
      Identity__InternalApiBaseUrl: http://identity:5001
      Identity__InternalApiKey: dev-internal-key-change-in-production
    command: ["CareHub.Appointment.dll"]
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_started

