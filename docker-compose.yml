# CareHub local dependencies (Phase 13 dev notes)
# - Minimum RAM: ~2 GB free for Postgres + RabbitMQ + Redis containers (4 GB+ machine recommended).
# - Ports: 5432 Postgres, 5672 AMQP, 15672 RabbitMQ UI, 6379 Redis.
# - One-command stack: docker compose up -d (from repo root), then run services per README / launchSettings.

services:
  postgres:
    image: postgres:16-alpine
    container_name: carehub-postgres
    environment:
      POSTGRES_USER: carehub
      POSTGRES_PASSWORD: carehub_dev
      POSTGRES_DB: carehub_identity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Scripts/init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carehub"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: carehub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: carehub
      RABBITMQ_DEFAULT_PASS: carehub_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: carehub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
